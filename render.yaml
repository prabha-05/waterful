# Render — two separate services (decisions §2): the web app and the Meta
# cron/worker run independently so a long backfill never blocks web requests.
# Deployed on a paid (Pro) workspace, so both use the `starter` instance type.
#
# `--include=dev` on the build installs devDependencies (typescript, tailwind,
# tsx) which Render otherwise prunes — the Next build and the worker's tsx need them.
services:
  # 1) Web app (Next.js)
  - type: web
    name: waterful-web
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_GRAPH_VERSION
        value: v21.0

  # 2) Meta sync — daily 06:00 cron (decisions §6: every day 6 AM, last 28 days).
  - type: cron
    name: waterful-meta-sync
    runtime: node
    plan: starter
    schedule: "0 6 * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run worker:sync
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_GRAPH_VERSION
        value: v21.0
