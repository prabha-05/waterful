# Render — free-tier deploy.
#
# The web app runs on the FREE plan (spins down after ~15 min idle; cold start on
# next request). The nightly Meta-sync CRON is omitted because Render cron jobs have
# no free tier — trigger syncs manually from the in-app Meta Sync console instead.
# (To restore the automated 6 AM sync, re-add the `cron` service on a paid plan, or
# point a free external scheduler at a sync endpoint.)
#
# `--include=dev` on the build installs devDependencies (typescript, tailwind) which
# Render otherwise prunes — the Next build needs them.
services:
  - type: web
    name: waterful-web
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_GRAPH_VERSION
        value: v21.0
